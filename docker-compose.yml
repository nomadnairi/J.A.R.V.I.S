# J.A.R.V.I.S. — API + the public (sales/user) Telegram bot on one host.
#
#   cp .env.example .env      # keys, TELEGRAM_BOT_TOKEN (public bot), etc.
#   docker compose up -d --build
#
# Optional SECOND bot — your own private J.A.R.V.I.S. — same image, a different
# token and its own memory. It lives behind the "personal" profile so it only
# starts when you ask for it:
#
#   cp .env.example .env.personal   # personal bot token, TELEGRAM_ADMIN_USERS=you,
#                                   # no channel gate, BILLING_ENABLED=false
#   docker compose --profile personal up -d bot-personal
#
# The api + public bot share the data/ + logs/ volumes; the personal bot keeps
# its own memory so the two never mix.

services:
  api:
    build: .
    image: jarvis-assistant:latest
    command: python -m jarvis.api
    restart: unless-stopped
    env_file: .env
    environment:
      API_HOST: 0.0.0.0
      API_PORT: 8000
    ports:
      - "8000:8000"
    volumes:
      - jarvis-data:/app/data
      - jarvis-logs:/app/logs
    healthcheck:
      test: ["CMD", "python", "-c",
            "import urllib.request; urllib.request.urlopen('http://localhost:8000/health', timeout=4)"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

  # Public bot — sales + user features (subscription gate, /buy, profiles).
  bot:
    build: .
    image: jarvis-assistant:latest
    command: python -m jarvis.interfaces.telegram_bot
    restart: unless-stopped
    env_file: .env
    depends_on:
      - api
    volumes:
      - jarvis-data:/app/data
      - jarvis-logs:/app/logs

  # Personal bot — your own private J.A.R.V.I.S. (opt-in: --profile personal).
  bot-personal:
    build: .
    image: jarvis-assistant:latest
    command: python -m jarvis.interfaces.telegram_bot
    restart: unless-stopped
    profiles: ["personal"]
    env_file: .env.personal
    volumes:
      - jarvis-personal-data:/app/data
      - jarvis-logs:/app/logs

volumes:
  jarvis-data:
  jarvis-personal-data:
  jarvis-logs:
