name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install fastapi "uvicorn[standard]" httpx
          pip install pytest pytest-asyncio pytest-cov ruff mypy

      - name: Lint
        run: ruff check jarvis tests

      - name: Type check (advisory)
        run: mypy jarvis || true

      - name: Dependency vulnerability scan (advisory)
        run: pip install pip-audit && pip-audit || true

      - name: Run tests with coverage
        run: python -m pytest -q --cov=jarvis --cov-report=term-missing

  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install scanners
        run: pip install pip-audit bandit semgrep

      - name: Dependency audit (pip-audit)
        run: pip-audit -r requirements.txt || true

      - name: SAST (bandit)
        run: bandit -r jarvis/ -c .bandit.yaml -ll

      - name: Pattern matching (semgrep)
        run: semgrep --config=p/python --config=p/security-audit --error jarvis/ || true

      - name: Secret detection (gitleaks)
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
