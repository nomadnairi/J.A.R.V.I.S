name: Desktop builds

# Builds the desktop app for every supported platform/architecture.
# PyInstaller cannot cross-compile, so each target runs on a native runner.
#
# Triggers:
#   - manually (workflow_dispatch) → artifacts downloadable from the run page;
#   - on a version tag (v*)        → binaries attached to the GitHub Release.
#
# Note: 32-bit Windows (x86) is not possible — Qt 6 / PySide6 ship 64-bit
# packages only.

on:
  workflow_dispatch:
  push:
    tags: ["v*"]

jobs:
  build:
    name: ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    continue-on-error: ${{ matrix.experimental }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            target: windows-amd64
            experimental: false
          - os: windows-11-arm
            target: windows-arm64
            experimental: true
          - os: ubuntu-latest
            target: linux-amd64
            experimental: false
          - os: ubuntu-24.04-arm
            target: linux-arm64
            experimental: false
          - os: macos-13
            target: macos-amd64
            experimental: false
          - os: macos-latest
            target: macos-arm64
            experimental: false

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Qt system libraries (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libegl1 libgl1 libopengl0 libxkbcommon0 libxkbcommon-x11-0 \
            libdbus-1-3 libfontconfig1

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ".[gui]" pyinstaller

      - name: Build
        env:
          JARVIS_BUILD_NAME: JARVIS-${{ matrix.target }}
        run: pyinstaller deploy/desktop/jarvis-desktop.spec

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: JARVIS-${{ matrix.target }}
          path: dist/*
          if-no-files-found: error

      - name: Attach to release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
