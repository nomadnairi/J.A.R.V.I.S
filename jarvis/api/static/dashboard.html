<!doctype html>
<html lang="en" data-theme="dark">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>J.A.R.V.I.S. — Command Deck</title>
<style>
  :root{
    --bg:#0A0F0D; --bg-2:#0C1311;
    --panel:rgba(19,27,24,.66); --panel-solid:#111917;
    --line:rgba(232,179,65,.16); --line-soft:rgba(234,240,236,.07);
    --ink:#EAF0EC; --muted:#8A9691; --dim:#5C6864;
    --accent:#E8B341; --accent-ink:#1A140A;
    --good:#3FD9B0; --warn:#F2A65A; --crit:#FF6B5A;
    --mono:ui-monospace,"SF Mono","Cascadia Code",Menlo,monospace;
    --sans:"SF Pro Display",system-ui,-apple-system,Segoe UI,Roboto,sans-serif;
    --r:14px;
  }
  *{box-sizing:border-box}
  html,body{height:100%}
  body{
    margin:0; background:
      radial-gradient(1200px 600px at 50% -10%, rgba(232,179,65,.06), transparent 60%),
      radial-gradient(900px 500px at 50% 120%, rgba(63,217,176,.05), transparent 60%),
      var(--bg);
    color:var(--ink); font-family:var(--sans);
    font-size:15px; line-height:1.5; overflow:hidden;
  }
  @media (prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important}}

  /* ---- shell ---- */
  .deck{display:grid; grid-template-rows:auto 1fr; height:100vh}
  .topbar{
    display:grid; grid-template-columns:1fr auto 1fr; align-items:center;
    gap:16px; padding:14px 22px; border-bottom:1px solid var(--line-soft);
    background:linear-gradient(180deg,rgba(12,19,17,.9),transparent);
  }
  .wordmark{display:flex; align-items:center; gap:12px; font-weight:800;
    letter-spacing:.42em; font-size:15px; text-transform:uppercase}
  .wordmark b{color:var(--accent); font-weight:800}
  .pill{display:inline-flex; align-items:center; gap:7px; font:600 11px/1 var(--sans);
    letter-spacing:.12em; text-transform:uppercase; color:var(--good);
    padding:5px 10px; border:1px solid rgba(63,217,176,.3); border-radius:999px;
    background:rgba(63,217,176,.06)}
  .dot{width:7px;height:7px;border-radius:50%;background:var(--good);
    box-shadow:0 0 0 0 rgba(63,217,176,.6); animation:beat 2.4s infinite}
  @keyframes beat{0%{box-shadow:0 0 0 0 rgba(63,217,176,.5)}70%{box-shadow:0 0 0 7px rgba(63,217,176,0)}100%{box-shadow:0 0 0 0 rgba(63,217,176,0)}}
  .clock{display:flex; align-items:center; justify-content:center; gap:14px;
    font-family:var(--mono); font-variant-numeric:tabular-nums}
  .clock .t{font-size:22px; letter-spacing:.06em; color:var(--ink)}
  .clock .sep{color:var(--dim)}
  .clock .d{font-size:12px; color:var(--muted); letter-spacing:.14em; text-transform:uppercase}
  .topright{display:flex; align-items:center; justify-content:flex-end; gap:12px}
  .chip{display:inline-flex; align-items:center; gap:8px; padding:6px 12px;
    border:1px solid var(--line); border-radius:999px; color:var(--muted);
    font:600 12px/1 var(--mono); background:var(--panel)}
  .icon-btn{width:36px;height:36px;border-radius:10px;border:1px solid var(--line-soft);
    background:var(--panel); color:var(--muted); cursor:pointer; display:grid; place-items:center;
    transition:.16s}
  .icon-btn:hover{color:var(--accent); border-color:var(--line)}
  .icon-btn:focus-visible{outline:2px solid var(--accent); outline-offset:2px}

  /* ---- main grid ---- */
  .grid{display:grid; grid-template-columns:320px 1fr 360px; gap:16px;
    padding:16px 22px 22px; min-height:0}
  .col{display:flex; flex-direction:column; gap:16px; min-height:0}
  .col.scroll{overflow:auto}
  .col.scroll::-webkit-scrollbar{width:8px}
  .col.scroll::-webkit-scrollbar-thumb{background:var(--line-soft); border-radius:8px}

  .card{border:1px solid var(--line-soft); border-radius:var(--r);
    background:var(--panel); backdrop-filter:blur(8px);
    box-shadow:0 1px 0 rgba(255,255,255,.02) inset, 0 18px 40px -30px rgba(0,0,0,.9)}
  .card > header{display:flex; align-items:center; justify-content:space-between;
    padding:12px 14px; border-bottom:1px solid var(--line-soft)}
  .card h3{margin:0; font:700 12px/1 var(--sans); letter-spacing:.16em;
    text-transform:uppercase; color:var(--muted); display:flex; gap:8px; align-items:center}
  .card h3 svg{color:var(--accent)}
  .card .body{padding:14px}
  .refresh{color:var(--dim); cursor:pointer; background:none; border:0; padding:2px}
  .refresh:hover{color:var(--accent)}

  /* ---- telemetry rows ---- */
  .meter{margin:10px 0}
  .meter .lab{display:flex; justify-content:space-between; font:600 12px/1 var(--sans);
    color:var(--muted); margin-bottom:6px}
  .meter .lab b{color:var(--ink); font-family:var(--mono); font-variant-numeric:tabular-nums}
  .track{height:6px; border-radius:6px; background:rgba(234,240,236,.06); overflow:hidden}
  .fill{height:100%; border-radius:6px;
    background:linear-gradient(90deg,var(--accent),#f6cf7a); transition:width .8s cubic-bezier(.2,.7,.2,1)}
  .fill.good{background:linear-gradient(90deg,var(--good),#7ff0d3)}
  .stat-row{display:grid; grid-template-columns:repeat(3,1fr); gap:8px; margin-top:12px}
  .stat{border:1px solid var(--line-soft); border-radius:10px; padding:10px; text-align:center}
  .stat .k{font:600 10px/1 var(--sans); letter-spacing:.12em; text-transform:uppercase; color:var(--dim)}
  .stat .v{margin-top:6px; font-family:var(--mono); font-size:15px; color:var(--ink); font-variant-numeric:tabular-nums}

  /* ---- weather ---- */
  .wx{display:flex; align-items:flex-start; justify-content:space-between}
  .wx .temp{font-family:var(--mono); font-size:40px; line-height:1; color:var(--ink); font-variant-numeric:tabular-nums}
  .wx .loc{color:var(--muted); font-size:13px; margin-top:6px}
  .wx .cond{color:var(--dim); font-size:12px; text-transform:capitalize}
  .wx .glyph{font-size:34px}

  /* ---- capabilities / mcp ---- */
  .caps{display:flex; flex-wrap:wrap; gap:7px}
  .cap{display:inline-flex; align-items:center; gap:6px; padding:5px 9px; border-radius:8px;
    font:600 11px/1 var(--sans); letter-spacing:.02em; border:1px solid var(--line-soft); color:var(--muted)}
  .cap .s{width:6px;height:6px;border-radius:50%}
  .cap .s.on{background:var(--good)} .cap .s.res{background:var(--warn)} .cap .s.off{background:var(--dim)}
  .mcp-list{display:flex; flex-direction:column; gap:8px}
  .mcp-srv{display:flex; align-items:center; justify-content:space-between; gap:8px;
    padding:9px 11px; border:1px solid var(--line-soft); border-radius:10px}
  .mcp-srv .nm{display:flex; align-items:center; gap:9px; font-weight:600}
  .mcp-srv .tools{font-family:var(--mono); font-size:12px; color:var(--muted)}
  .badge{font:600 10px/1 var(--sans); letter-spacing:.1em; text-transform:uppercase;
    padding:4px 7px; border-radius:6px}
  .badge.up{color:var(--good); background:rgba(63,217,176,.1)}
  .badge.down{color:var(--crit); background:rgba(255,107,90,.1)}
  .btn{display:inline-flex; align-items:center; gap:8px; cursor:pointer;
    font:700 12px/1 var(--sans); letter-spacing:.04em; padding:10px 14px; border-radius:10px;
    border:1px solid var(--line); color:var(--accent); background:rgba(232,179,65,.06); width:100%; justify-content:center}
  .btn:hover{background:rgba(232,179,65,.12)}
  .btn:focus-visible{outline:2px solid var(--accent); outline-offset:2px}

  /* ---- reactor core ---- */
  .core{display:flex; flex-direction:column; align-items:center; justify-content:center; gap:0;
    position:relative; min-height:0}
  .reactor{position:relative; width:min(46vh,360px); aspect-ratio:1}
  .ring{position:absolute; inset:0; border-radius:50%; border:1px solid var(--line)}
  .ring.r2{inset:10%; border-color:rgba(232,179,65,.26); border-style:dashed}
  .ring.r3{inset:22%; border-color:rgba(232,179,65,.18)}
  .ring.spin{animation:spin 24s linear infinite}
  .ring.spin.rev{animation-direction:reverse; animation-duration:34s}
  @keyframes spin{to{transform:rotate(360deg)}}
  .ticks{position:absolute; inset:4%; border-radius:50%;
    background:conic-gradient(from 0deg, transparent 0 6deg, rgba(232,179,65,.35) 6deg 7deg, transparent 7deg 15deg);
    -webkit-mask:radial-gradient(circle, transparent 60%, #000 61%); mask:radial-gradient(circle, transparent 60%, #000 61%);
    animation:spin 60s linear infinite}
  .hub{position:absolute; inset:31%; border-radius:50%;
    background:radial-gradient(circle at 50% 40%, rgba(246,207,122,.5), rgba(232,179,65,.12) 55%, transparent 70%);
    box-shadow:0 0 60px rgba(232,179,65,.28), inset 0 0 40px rgba(232,179,65,.35);
    display:grid; place-items:center; animation:glow 4.5s ease-in-out infinite}
  @keyframes glow{0%,100%{box-shadow:0 0 50px rgba(232,179,65,.22), inset 0 0 34px rgba(232,179,65,.3)}
    50%{box-shadow:0 0 80px rgba(232,179,65,.4), inset 0 0 48px rgba(232,179,65,.5)}}
  .viz{display:flex; align-items:flex-end; gap:4px; height:34px}
  .viz i{width:4px; background:var(--accent); border-radius:2px; height:10px; opacity:.85;
    animation:eq 1.1s ease-in-out infinite}
  .viz i:nth-child(2){animation-delay:.15s}.viz i:nth-child(3){animation-delay:.3s}
  .viz i:nth-child(4){animation-delay:.45s}.viz i:nth-child(5){animation-delay:.6s}
  @keyframes eq{0%,100%{height:8px}50%{height:30px}}
  .core .name{margin-top:26px; font-weight:800; letter-spacing:.5em; font-size:26px; text-transform:uppercase; text-wrap:balance}
  .core .name b{color:var(--accent)}
  .status{margin-top:12px; display:inline-flex; align-items:center; gap:9px; color:var(--good);
    font:600 12px/1 var(--sans); letter-spacing:.14em; text-transform:uppercase;
    padding:7px 14px; border:1px solid rgba(63,217,176,.28); border-radius:999px; background:rgba(63,217,176,.05)}
  .status.offline{color:var(--warn); border-color:rgba(242,166,90,.3); background:rgba(242,166,90,.05)}
  .dock{margin-top:26px; display:flex; gap:12px}
  .dockbtn{width:52px;height:52px;border-radius:16px; border:1px solid var(--line);
    background:var(--panel); color:var(--muted); cursor:pointer; display:grid; place-items:center; transition:.16s}
  .dockbtn:hover{color:var(--accent); border-color:var(--accent); transform:translateY(-2px)}
  .dockbtn.primary{background:linear-gradient(180deg,rgba(232,179,65,.16),rgba(232,179,65,.05)); color:var(--accent)}
  .dockbtn:focus-visible{outline:2px solid var(--accent); outline-offset:2px}

  /* ---- conversation ---- */
  .chat{display:flex; flex-direction:column; min-height:0; flex:1}
  .chat .stream{flex:1; overflow:auto; padding:14px; display:flex; flex-direction:column; gap:12px}
  .chat .stream::-webkit-scrollbar{width:8px}
  .chat .stream::-webkit-scrollbar-thumb{background:var(--line-soft); border-radius:8px}
  .msg{max-width:88%; padding:11px 13px; border-radius:14px; font-size:14px; line-height:1.5}
  .msg.j{align-self:flex-start; background:rgba(232,179,65,.08); border:1px solid var(--line);
    border-bottom-left-radius:5px}
  .msg.u{align-self:flex-end; background:rgba(234,240,236,.06); border:1px solid var(--line-soft);
    border-bottom-right-radius:5px}
  .msg .who{font:700 10px/1 var(--sans); letter-spacing:.14em; text-transform:uppercase; color:var(--dim); margin-bottom:6px}
  .msg.j .who{color:var(--accent)}
  .composer{display:flex; gap:8px; padding:12px; border-top:1px solid var(--line-soft)}
  .composer input{flex:1; background:var(--bg-2); border:1px solid var(--line-soft); color:var(--ink);
    border-radius:11px; padding:11px 13px; font-family:var(--sans); font-size:14px}
  .composer input:focus{outline:none; border-color:var(--line)}
  .send{width:44px; border-radius:11px; border:1px solid var(--line); background:rgba(232,179,65,.1);
    color:var(--accent); cursor:pointer; display:grid; place-items:center}
  .send:hover{background:rgba(232,179,65,.18)}

  .card.tall{flex:1; display:flex; flex-direction:column; min-height:0}
  @media (max-width:1080px){.grid{grid-template-columns:1fr; overflow:auto; height:auto}
    body{overflow:auto} .reactor{width:min(70vw,320px)}}
</style>
</head>
<body>
<div class="deck">
  <!-- top bar -->
  <div class="topbar">
    <div class="wordmark">J<b>·</b>A<b>·</b>R<b>·</b>V<b>·</b>I<b>·</b>S
      <span class="pill"><span class="dot"></span> Online</span>
    </div>
    <div class="clock">
      <span class="t" id="time">--:--:--</span>
      <span class="sep">|</span>
      <span class="d" id="date">—</span>
    </div>
    <div class="topright">
      <span class="chip" id="loc">◍ —</span>
      <button class="icon-btn" title="Settings" aria-label="Settings">
        <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.6 1.6 0 0 0 .3 1.8l.1.1a2 2 0 1 1-2.8 2.8l-.1-.1a1.6 1.6 0 0 0-2.7 1.1V21a2 2 0 1 1-4 0v-.1A1.6 1.6 0 0 0 7 19.4a1.6 1.6 0 0 0-1.8.3l-.1.1a2 2 0 1 1-2.8-2.8l.1-.1a1.6 1.6 0 0 0-1.1-2.7H1a2 2 0 1 1 0-4h.1A1.6 1.6 0 0 0 4.6 7a1.6 1.6 0 0 0-.3-1.8l-.1-.1a2 2 0 1 1 2.8-2.8l.1.1A1.6 1.6 0 0 0 9 2.6h.1A1.6 1.6 0 0 0 12 1.1V1a2 2 0 1 1 4 0v.1A1.6 1.6 0 0 0 17 4.6a1.6 1.6 0 0 0 1.8-.3l.1-.1a2 2 0 1 1 2.8 2.8l-.1.1a1.6 1.6 0 0 0-.3 1.8V9a1.6 1.6 0 0 0 1.1 2.9H23a2 2 0 1 1 0 4h-.1a1.6 1.6 0 0 0-1.5 1.1z"/></svg>
      </button>
    </div>
  </div>

  <!-- deck -->
  <div class="grid">
    <!-- left rail -->
    <div class="col scroll">
      <section class="card">
        <header><h3><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7"><rect x="3" y="4" width="18" height="12" rx="2"/><path d="M8 20h8M12 16v4"/></svg> System</h3>
          <button class="refresh" onclick="loadState()" aria-label="Refresh">↻</button></header>
        <div class="body">
          <div class="meter"><div class="lab">CPU Load <b id="cpu">—</b></div><div class="track"><div class="fill" id="cpuBar" style="width:0"></div></div></div>
          <div class="meter"><div class="lab">Memory <b id="ram">—</b></div><div class="track"><div class="fill good" id="ramBar" style="width:0"></div></div></div>
          <div class="stat-row">
            <div class="stat"><div class="k">Session</div><div class="v" id="sess">1</div></div>
            <div class="stat"><div class="k">Tools</div><div class="v" id="tools">—</div></div>
            <div class="stat"><div class="k">Uptime</div><div class="v" id="up">00:00</div></div>
          </div>
        </div>
      </section>

      <section class="card">
        <header><h3><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7"><path d="M4 15a4 4 0 0 1 0-8 5 5 0 0 1 9.6-1.5A4 4 0 0 1 18 15z"/></svg> Weather</h3></header>
        <div class="body">
          <div class="wx">
            <div><div class="temp" id="wxT">—</div><div class="loc" id="wxL">—</div><div class="cond" id="wxC">—</div></div>
            <div class="glyph" id="wxG">☁️</div>
          </div>
        </div>
      </section>

      <section class="card">
        <header><h3><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7"><path d="M12 2 4 6v6c0 5 3.4 8 8 10 4.6-2 8-5 8-10V6z"/></svg> Capabilities</h3></header>
        <div class="body"><div class="caps" id="caps"><span class="cap"><span class="s off"></span> loading…</span></div></div>
      </section>

      <section class="card">
        <header><h3><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7"><path d="M4 7h16M4 12h16M4 17h10"/></svg> MCP Servers</h3>
          <button class="refresh" onclick="loadState()" aria-label="Refresh">↻</button></header>
        <div class="body">
          <div class="mcp-list" id="mcp"></div>
          <button class="btn" style="margin-top:12px" onclick="connectServer()">＋ Connect MCP server</button>
        </div>
      </section>
    </div>

    <!-- center core -->
    <div class="col core">
      <div class="reactor">
        <div class="ring r1 spin"></div>
        <div class="ring r2 spin rev"></div>
        <div class="ring r3"></div>
        <div class="ticks"></div>
        <div class="hub"><div class="viz"><i></i><i></i><i></i><i></i><i></i></div></div>
      </div>
      <div class="name">J<b>.</b>A<b>.</b>R<b>.</b>V<b>.</b>I<b>.</b>S</div>
      <div class="status" id="status"><span class="dot"></span> Listening for wake word…</div>
      <div class="dock">
        <button class="dockbtn" title="Camera" aria-label="Camera"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/><circle cx="12" cy="13" r="4"/></svg></button>
        <button class="dockbtn primary" title="Voice" aria-label="Voice" onclick="pulse()"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7"><rect x="9" y="2" width="6" height="12" rx="3"/><path d="M5 11a7 7 0 0 0 14 0M12 18v4"/></svg></button>
        <button class="dockbtn" title="Keyboard" aria-label="Keyboard" onclick="document.getElementById('q').focus()"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7"><rect x="2" y="6" width="20" height="12" rx="2"/><path d="M6 10h.01M10 10h.01M14 10h.01M18 10h.01M8 14h8"/></svg></button>
      </div>
    </div>

    <!-- right conversation -->
    <div class="col">
      <section class="card tall">
        <header><h3><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg> Conversation</h3>
          <button class="refresh" onclick="clearChat()">Clear</button></header>
        <div class="chat">
          <div class="stream" id="stream">
            <div class="msg j"><div class="who">Jarvis</div>Good day, sir. All systems are nominal. How may I assist you?</div>
          </div>
          <div class="composer">
            <input id="q" placeholder="Type a message…" autocomplete="off" onkeydown="if(event.key==='Enter')sendMsg()" />
            <button class="send" onclick="sendMsg()" aria-label="Send"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M22 2 11 13M22 2l-7 20-4-9-9-4z"/></svg></button>
          </div>
        </div>
      </section>
    </div>
  </div>
</div>

<script>
  // ---- config: the desktop shell can inject window.JARVIS = {api, key} ----
  const CFG = Object.assign({api:"", key:""}, window.JARVIS||{});
  const $ = id => document.getElementById(id);

  // ---- clock ----
  function tick(){
    const d = new Date();
    $("time").textContent = d.toLocaleTimeString([], {hour12:false});
    $("date").textContent = d.toLocaleDateString([], {month:"short", day:"numeric", year:"numeric"});
  }
  setInterval(tick, 1000); tick();

  // ---- demo fallback so the deck looks alive offline (like the screenshot) ----
  const DEMO = {
    online:false,
    cpu:8, ram:44, tools:22, uptime:"00:07:19", session:1,
    weather:{temp:"25.2°", loc:"Quezon City, PH", cond:"overcast clouds", glyph:"☁️"},
    capabilities:[["Memory","on"],["Voice","on"],["Search","on"],["Images","res"],
                  ["Files","res"],["Coding","res"],["MCP","on"],["Agents","on"]],
    mcp:[{name:"filesystem",up:true,tools:6},{name:"hermes",up:true,tools:14},
        {name:"brave-search",up:false,tools:0}]
  };

  function render(s){
    $("status").innerHTML = s.online
      ? '<span class="dot"></span> Listening for wake word…'
      : '⚠ Backend offline — showing last known state';
    $("status").classList.toggle("offline", !s.online);
    $("cpu").textContent = s.cpu+"%"; $("cpuBar").style.width = s.cpu+"%";
    $("ram").textContent = s.ram+"%"; $("ramBar").style.width = s.ram+"%";
    $("tools").textContent = s.tools; $("up").textContent = s.uptime; $("sess").textContent = s.session;
    const w = s.weather; $("wxT").textContent = w.temp; $("wxL").textContent = w.loc;
    $("wxC").textContent = w.cond; $("wxG").textContent = w.glyph;
    $("loc").textContent = "◍ "+w.loc.split(",")[0];
    $("caps").innerHTML = s.capabilities.map(([n,st])=>
      `<span class="cap"><span class="s ${st}"></span>${n}</span>`).join("");
    $("mcp").innerHTML = s.mcp.length ? s.mcp.map(m=>
      `<div class="mcp-srv"><span class="nm">${m.up?'🟢':'🔴'} ${m.name}</span>
        <span class="tools">${m.tools} 🔧</span>
        <span class="badge ${m.up?'up':'down'}">${m.up?'up':'down'}</span></div>`).join("")
      : '<div class="tools" style="color:var(--dim);font-family:var(--mono);font-size:12px">No servers configured</div>';
  }

  async function loadState(){
    if(!CFG.api){ render(DEMO); return; }
    try{
      const r = await fetch(CFG.api+"/dashboard/state",
        {headers: CFG.key?{"X-API-Key":CFG.key}:{}});
      if(!r.ok) throw 0;
      const s = await r.json(); s.online = true; render(s);
    }catch(e){ render(DEMO); }
  }
  loadState();

  // ---- chat ----
  function addMsg(text, who){
    const el = document.createElement("div");
    el.className = "msg "+(who==="u"?"u":"j");
    el.innerHTML = `<div class="who">${who==="u"?"You":"Jarvis"}</div>`+
      text.replace(/</g,"&lt;");
    $("stream").appendChild(el); $("stream").scrollTop = $("stream").scrollHeight;
    return el;
  }
  async function sendMsg(){
    const q = $("q").value.trim(); if(!q) return;
    $("q").value = ""; addMsg(q, "u"); pulse();
    const thinking = addMsg("…", "j");
    if(!CFG.api){ thinking.innerHTML = '<div class="who">Jarvis</div>Connect me to a backend to reply, sir. (Demo mode.)'; return; }
    try{
      const r = await fetch(CFG.api+"/chat", {method:"POST",
        headers:{"Content-Type":"application/json", ...(CFG.key?{"X-API-Key":CFG.key}:{})},
        body: JSON.stringify({message:q, session_id:"dashboard"})});
      const j = await r.json();
      thinking.innerHTML = '<div class="who">Jarvis</div>'+(j.reply||"—").replace(/</g,"&lt;");
    }catch(e){ thinking.innerHTML = '<div class="who">Jarvis</div>Connection failed, sir.'; }
    $("stream").scrollTop = $("stream").scrollHeight;
  }
  function clearChat(){ $("stream").innerHTML =
    '<div class="msg j"><div class="who">Jarvis</div>Conversation cleared, sir.</div>'; }

  function connectServer(){
    const spec = prompt("MCP server — command (stdio) or https URL (sse):");
    if(!spec) return;
    if(!CFG.api){ alert("Demo mode: in the app this connects the server and mounts its tools."); return; }
    fetch(CFG.api+"/dashboard/mcp", {method:"POST",
      headers:{"Content-Type":"application/json", ...(CFG.key?{"X-API-Key":CFG.key}:{})},
      body: JSON.stringify({spec})}).then(loadState);
  }

  function pulse(){
    document.querySelectorAll(".viz i").forEach(b=>{
      b.style.animationDuration = "0.6s"; setTimeout(()=>b.style.animationDuration="1.1s", 900);
    });
  }
</script>
</body>
</html>
